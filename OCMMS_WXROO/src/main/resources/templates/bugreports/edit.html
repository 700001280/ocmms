<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_edit_entity(#{label_bugreport})}">
    Edit BugReport - Spring Roo application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/2.5.4/build/jquery.datetimepicker.min.css}" />

  </head>
  

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">

        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('BugReportsCollectionThymeleafController')},itemLink=${@linkBuilder.of('BugReportsItemThymeleafController')}">

          <h1 data-th-text="#{label_edit_entity(#{label_bugreport})}">Edit BugReport</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${bugReport}" data-th-action="${itemLink.to('update').with('bugReport', bugReport.id)}">
            <input type="hidden" name="_method" value="PUT" />
            	<input type="hidden" name="version" data-th-value="*{version}" />

            <!-- CONCURRENCY CONTROL -->
            <div data-th-replace="~{fragments/concurrency-control :: concurrency-control(editFormUrl = ${itemLink.to('editForm').with('bugReport', bugReport.id)})}"></div>
            <!-- /CONCURRENCY CONTROL -->

             <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_bugreport})}">BugReport data </legend>

<div class="form-group has-error has-feedback" data-z="429fc0c1" id="bugreport-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_bugreport_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_bugreport_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="5c876c1" id="bugreport-title-field" data-th-classappend="${#fields.hasErrors('title')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="title" class="col-md-3 control-label" data-th-text="#{label_bugreport_title}">title</label>
  <div class="col-md-6">
    <input id="title" name="title" data-th-value="*{{title}}" type="text" class="form-control" placeholder="title" data-th-placeholder="#{label_bugreport_title}" data-toggle="tooltip" aria-describedby="titleStatus" />
      <span data-th-classappend="${#fields.hasErrors('title')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('title')}" aria-hidden="true"></span>
      <span id="title-error" class="help-block" data-th-if="${#fields.hasErrors('title')}" data-th-errors="*{title}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="7080e3a1" id="bugreport-submitter-field" data-th-classappend="${#fields.hasErrors('submitter')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')}">
    <label for="submitter" class="col-md-3 control-label" data-th-text="#{label_bugreport_submitter}">Employee</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{submitter}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{submitter} == null" data-th-value="*{submitter.id}" data-th-text="*{{submitter}}" selected="selected">Employee</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('submitter')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('submitter')}" aria-hidden="true"></span>
      <span id="submitter-error" class="help-block" data-th-if="${#fields.hasErrors('submitter')}" data-th-errors="*{submitter}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" id="bugreport-submitdate-field" data-z="4c8c1f9d" data-th-classappend="${#fields.hasErrors('submitDate')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="submitDate" class="col-md-3 control-label" data-th-text="#{label_bugreport_submitdate}">submitDate</label>
  <div class="col-md-3">
    <input id="submitDate" name="submitDate" data-th-value="*{{submitDate}}" type="text" class="form-control datetimepicker" placeholder="submitDate" data-th-placeholder="#{label_bugreport_submitdate}" data-th-attr="data-dateformat=${submitDate_date_format}" data-toggle="tooltip" /> <span data-th-classappend="${#fields.hasErrors('submitDate')}? 'glyphicon glyphicon-remove form-control-feedback'" data-th-if="${#fields.hasErrors('submitDate')}" aria-hidden="true"></span>
     <span id="submitDate-error" class="help-block" data-th-if="${#fields.hasErrors('submitDate')}" data-th-errors="*{submitDate}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" id="bugreport-solved-field" data-z="508f469d" data-th-classappend="${#fields.hasErrors('solved')}? 'has-error has-feedback'" data-th-class="form-group">
  <label class="col-md-3 control-label" for="solved" data-th-text="#{label_bugreport_solved}">solved</label>
  <div class="col-md-6">
    <div class="checkbox">
      <input type="checkbox" data-th-field="*{solved}" data-th-title="#{label_requiredfield}" data-toggle="tooltip" />
       <span data-th-classappend="${#fields.hasErrors('solved')}? 'form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('solved')}" aria-hidden="true"></span>
        <span id="solved-error" class="help-block" data-th-if="${#fields.hasErrors('solved')}" data-th-errors="*{solved}">Error message.</span>
    </div>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="e82c951d" id="bugreport-closedescription-field" data-th-classappend="${#fields.hasErrors('closeDescription')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="closeDescription" class="col-md-3 control-label" data-th-text="#{label_bugreport_closedescription}">closeDescription</label>
  <div class="col-md-6">
    <input id="closeDescription" name="closeDescription" data-th-value="*{{closeDescription}}" type="text" class="form-control" placeholder="closeDescription" data-th-placeholder="#{label_bugreport_closedescription}" data-toggle="tooltip" aria-describedby="closeDescriptionStatus" />
      <span data-th-classappend="${#fields.hasErrors('closeDescription')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('closeDescription')}" aria-hidden="true"></span>
      <span id="closeDescription-error" class="help-block" data-th-if="${#fields.hasErrors('closeDescription')}" data-th-errors="*{closeDescription}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="a6afd001" id="bugreport-handler-field" data-th-classappend="${#fields.hasErrors('handler')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')}">
    <label for="handler" class="col-md-3 control-label" data-th-text="#{label_bugreport_handler}">Employee</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{handler}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{handler} == null" data-th-value="*{handler.id}" data-th-text="*{{handler}}" selected="selected">Employee</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('handler')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('handler')}" aria-hidden="true"></span>
      <span id="handler-error" class="help-block" data-th-if="${#fields.hasErrors('handler')}" data-th-errors="*{handler}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" id="bugreport-solveddate-field" data-z="6b85a5fd" data-th-classappend="${#fields.hasErrors('solvedDate')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="solvedDate" class="col-md-3 control-label" data-th-text="#{label_bugreport_solveddate}">solvedDate</label>
  <div class="col-md-3">
    <input id="solvedDate" name="solvedDate" data-th-value="*{{solvedDate}}" type="text" class="form-control datetimepicker" placeholder="solvedDate" data-th-placeholder="#{label_bugreport_solveddate}" data-th-attr="data-dateformat=${solvedDate_date_format}" data-toggle="tooltip" /> <span data-th-classappend="${#fields.hasErrors('solvedDate')}? 'glyphicon glyphicon-remove form-control-feedback'" data-th-if="${#fields.hasErrors('solvedDate')}" aria-hidden="true"></span>
     <span id="solvedDate-error" class="help-block" data-th-if="${#fields.hasErrors('solvedDate')}" data-th-errors="*{solvedDate}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="aec9f19d" id="bugreport-pics-field" data-th-classappend="${#fields.hasErrors('pics')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="pics" class="col-md-3 control-label" data-th-text="#{label_bugreport_pics}">pics</label>
  <div class="col-md-6">
    <input id="pics" name="pics" data-th-value="*{{pics}}" type="text" class="form-control" placeholder="pics" data-th-placeholder="#{label_bugreport_pics}" data-toggle="tooltip" aria-describedby="picsStatus" />
      <span data-th-classappend="${#fields.hasErrors('pics')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('pics')}" aria-hidden="true"></span>
      <span id="pics-error" class="help-block" data-th-if="${#fields.hasErrors('pics')}" data-th-errors="*{pics}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="fb05147d" id="bugreport-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_bugreport_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
             </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-12">
                  <div class="pull-left">
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                  </div>
                  <div class="pull-right">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                  </div>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
   </div>
   <!-- /CONTAINER -->

   <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
   </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
        jQuery(document).ready(
      	  function() {
      	    Inputmask.extendAliases({
      	      'numeric' : {
      	         'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
      	         'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
      	       },
      	       'currency' : {
      	          'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
      	          'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
      	        }
      	    });
      	 });
       })(jQuery);
    </script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
      </script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
      </script>
    <!-- Concurrency control management -->
    <script data-th-src="@{/public/js/concurrency-control.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
         jQuery(document).ready(function() {
      	   jQuery.extend( jQuery.validator.messages, {
      	     'dateformat' : /*[[#{error_invalid_date}]]*/ 'Please enter a correct date/time',
      	     'inputmask': /*[[#{error_invalid_maskValue}]]*/ 'Please enter a valid value',
      	   });
      	 });
      })(jQuery);
      </script>

    </div>

  </body>

</html>
