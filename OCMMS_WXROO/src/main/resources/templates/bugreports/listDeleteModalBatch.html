<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="bugreport-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('BugReportsCollectionThymeleafController')},itemLink=${@linkBuilder.of('BugReportsItemThymeleafController')}">
    <table id="bugreport-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="description" data-th-text="#{label_bugreport_description}">description</th>
          <th data-data="title" data-th-text="#{label_bugreport_title}">title</th>
          <th data-data="submitter" data-th-text="#{label_bugreport_submitter}">submitter</th>
          <th data-data="submitDate" data-th-text="#{label_bugreport_submitdate}">submitDate</th>
          <th data-data="solved" data-th-text="#{label_bugreport_solved}">solved</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>description</td>
          <td>title</td>
          <td>submitter</td>
          <td>submitDate</td>
          <td>solved</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
