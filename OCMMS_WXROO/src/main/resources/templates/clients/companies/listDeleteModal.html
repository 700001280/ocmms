<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="companies-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('ClientsItemCompaniesThymeleafController')}">
    <table id="companies-detail-table-item-to-remove" data-parent-table="client-entity-table" data-data-parent-id="${client != null ? client.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('client', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="code" data-th-text="#{label_client_companies_code}">code</th>
              <th data-data="orgName" data-th-text="#{label_client_companies_orgname}">orgName</th>
              <th data-data="description" data-th-text="#{label_client_companies_description}">description</th>
              <th data-data="postalCode" data-th-text="#{label_client_companies_postalcode}">postalCode</th>
              <th data-data="phone" data-th-text="#{label_client_companies_phone}">phone</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>code</td>
              <td>orgName</td>
              <td>description</td>
              <td>postalCode</td>
              <td>phone</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
