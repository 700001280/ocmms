<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="plants-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('CompaniesItemPlantsThymeleafController')}">
    <table id="plants-detail-table-items-to-remove-batch" data-parent-table="company-entity-table" data-data-parent-id="${company != null ? company.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('company', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="code" data-th-text="#{label_company_plants_code}">code</th>
              <th data-data="orgName" data-th-text="#{label_company_plants_orgname}">orgName</th>
              <th data-data="description" data-th-text="#{label_company_plants_description}">description</th>
              <th data-data="postalCode" data-th-text="#{label_company_plants_postalcode}">postalCode</th>
              <th data-data="phone" data-th-text="#{label_company_plants_phone}">phone</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>code</td>
              <td>orgName</td>
              <td>description</td>
              <td>postalCode</td>
              <td>phone</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
