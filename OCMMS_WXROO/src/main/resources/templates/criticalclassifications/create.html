<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_create_entity(#{label_criticalclassification})}">
      Create CriticalClassification - OCMMSROO - SpringRoo Application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/build/jquery.datetimepicker.min.css}" />

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">
        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('CriticalClassificationsCollectionThymeleafController')}">

          <h1 data-th-text="#{label_create_entity(#{label_criticalclassification})}">Create CriticalClassification</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${criticalClassification}" data-th-action="${collectionLink.to('create').with('criticalClassification', criticalClassification.id)}">

            <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_criticalclassification})}">CriticalClassification data </legend>

<div class="form-group has-error has-feedback" data-z="bc011210" id="criticalclassification-category-field" data-th-classappend="${#fields.hasErrors('category')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="category" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_category}">category</label>
  <div class="col-md-6">
    <input id="category" name="category" data-th-value="*{{category}}" type="text" class="form-control" placeholder="category" data-th-placeholder="#{label_criticalclassification_category}" data-toggle="tooltip" aria-describedby="categoryStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('category')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('category')}" aria-hidden="true"></span>
      <span id="category-error" class="help-block" data-th-if="${#fields.hasErrors('category')}" data-th-errors="*{category}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="930cddce" id="criticalclassification-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_criticalclassification_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="b324d9ae" id="criticalclassification-subcategory-field" data-th-classappend="${#fields.hasErrors('subCategory')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="subCategory" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_subcategory}">subCategory</label>
  <div class="col-md-6">
    <input id="subCategory" name="subCategory" data-th-value="*{{subCategory}}" type="text" class="form-control" placeholder="subCategory" data-th-placeholder="#{label_criticalclassification_subcategory}" data-toggle="tooltip" aria-describedby="subCategoryStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('subCategory')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('subCategory')}" aria-hidden="true"></span>
      <span id="subCategory-error" class="help-block" data-th-if="${#fields.hasErrors('subCategory')}" data-th-errors="*{subCategory}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="7fc78970" id="criticalclassification-subdescription-field" data-th-classappend="${#fields.hasErrors('subDescription')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="subDescription" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_subdescription}">subDescription</label>
  <div class="col-md-6">
    <input id="subDescription" name="subDescription" data-th-value="*{{subDescription}}" type="text" class="form-control" placeholder="subDescription" data-th-placeholder="#{label_criticalclassification_subdescription}" data-toggle="tooltip" aria-describedby="subDescriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('subDescription')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('subDescription')}" aria-hidden="true"></span>
      <span id="subDescription-error" class="help-block" data-th-if="${#fields.hasErrors('subDescription')}" data-th-errors="*{subDescription}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="4c435bb0" id="criticalclassification-riskmatrix-field" data-th-classappend="${#fields.hasErrors('riskMatrix')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="riskMatrix" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_riskmatrix}">riskMatrix</label>
  <div class="col-md-6">
    <input id="riskMatrix" name="riskMatrix" data-th-value="*{{riskMatrix}}" type="text" class="form-control" placeholder="riskMatrix" data-th-placeholder="#{label_criticalclassification_riskmatrix}" data-toggle="tooltip" aria-describedby="riskMatrixStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('riskMatrix')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('riskMatrix')}" aria-hidden="true"></span>
      <span id="riskMatrix-error" class="help-block" data-th-if="${#fields.hasErrors('riskMatrix')}" data-th-errors="*{riskMatrix}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="b83b9910" id="criticalclassification-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_criticalclassification_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
            </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-9 col-md-offset-3">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											Inputmask
													.extendAliases({
														'numeric' : {
															'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
															'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
														},
														'currency' : {
															'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
															'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
														}
													});
										});
					})(jQuery);
  		</script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
		  </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
			</script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
			</script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
			</script>

    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											jQuery
													.extend(
															jQuery.validator.messages,
															{
																'dateformat' : /*[[#{error_invalid_date}]]*/'Please enter a correct date/time',
																'inputmask' : /*[[#{error_invalid_maskValue}]]*/'Please enter a valid value',
															});
										});
					})(jQuery);
		  </script>

    </div>

  </body>

</html>
