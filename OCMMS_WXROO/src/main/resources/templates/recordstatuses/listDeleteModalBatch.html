<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="recordstatus-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')},itemLink=${@linkBuilder.of('RecordStatusesItemThymeleafController')}">
    <table id="recordstatus-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_recordstatus_code}">code</th>
          <th data-data="description" data-th-text="#{label_recordstatus_description}">description</th>
          <th data-data="createdDate" data-th-text="#{label_recordstatus_createddate}">createdDate</th>
          <th data-data="createdBy" data-th-text="#{label_recordstatus_createdby}">createdBy</th>
          <th data-data="lastModifiedDate" data-th-text="#{label_recordstatus_lastmodifieddate}">lastModifiedDate</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>description</td>
          <td>createdDate</td>
          <td>createdBy</td>
          <td>lastModifiedDate</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
