        <tr>
          <th data-data="code" data-th-text="#{label_barcodedefinition_code}">code</th>

          <th data-data="recordStatus" data-th-text="#{label_barcodedefinition_recordstatus}">recordStatus</th>
          <th data-data="createdDate" data-th-text="#{label_barcodedefinition_createddate}">createdDate</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>className</td>
          <td>description</td>
          <td>recordStatus</td>

        </tr>
