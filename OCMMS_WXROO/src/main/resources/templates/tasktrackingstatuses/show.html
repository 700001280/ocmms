<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-list-layout}">
  <head id="head">

    <title data-th-text="|#{label_show_entity(#{label_tasktrackingstatus})}|">Show TaskTrackingStatus - Spring Roo application</title>

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!--CONTAINER-->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content" data-th-object="${taskTrackingStatus}">
        <div class="container-fluid content">

          <!-- CONTENT -->
          <h1 data-th-text="#{label_show_entity(#{label_tasktrackingstatus})}">Show TaskTrackingStatus</h1>

            <div id="mainEntityFieldSet">
              <h2 data-th-text="#{label_data_entity(#{label_tasktrackingstatus})}">TaskTrackingStatus data</h2>
              <ul class="list-unstyled" id="containerFields">
                  <li id="tasktrackingstatus-code-field" data-z="30fb7459">
            	      <strong data-th-text="#{label_tasktrackingstatus_code}">code</strong>
                    <span data-th-text="*{{code}}">codeValue</span>
         	        </li>
                  <li id="tasktrackingstatus-description-field" data-z="7d2fba05">
            	      <strong data-th-text="#{label_tasktrackingstatus_description}">description</strong>
                    <span data-th-text="*{{description}}">descriptionValue</span>
         	        </li>
                  <li id="tasktrackingstatus-recordstatus-field" data-z="127443b9">
            	      <strong data-th-text="#{label_tasktrackingstatus_recordstatus}">recordStatus</strong>
                    <span data-th-text="*{{recordStatus}}">recordStatusValue</span>
         	        </li>
                  <li id="tasktrackingstatus-createddate-field" data-z="8ba83ae5">
            	      <strong data-th-text="#{label_tasktrackingstatus_createddate}">createdDate</strong>
                    <span data-th-text="*{{createdDate}}">createdDateValue</span>
         	        </li>
                  <li id="tasktrackingstatus-createdby-field" data-z="c257a345">
            	      <strong data-th-text="#{label_tasktrackingstatus_createdby}">createdBy</strong>
                    <span data-th-text="*{{createdBy}}">createdByValue</span>
         	        </li>
                  <li id="tasktrackingstatus-lastmodifieddate-field" data-z="23f6e199">
            	      <strong data-th-text="#{label_tasktrackingstatus_lastmodifieddate}">lastModifiedDate</strong>
                    <span data-th-text="*{{lastModifiedDate}}">lastModifiedDateValue</span>
         	        </li>
                  <li id="tasktrackingstatus-lastmodifiedby-field" data-z="f3c866f9">
            	      <strong data-th-text="#{label_tasktrackingstatus_lastmodifiedby}">lastModifiedBy</strong>
                    <span data-th-text="*{{lastModifiedBy}}">lastModifiedByValue</span>
         	        </li>
              </ul>
            </div>


          <div class="clearfix">
            <div class="pull-right">
             <a id="TaskTrackingStatus_edit" href="edit.html" class="btn btn-primary" data-th-title="#{label_goEdit}" data-th-href="${@linkBuilder.of('TaskTrackingStatusesItemThymeleafController').to('editForm').with('taskTrackingStatus', taskTrackingStatus.id)}" data-th-text="#{label_edit}">Edit</a>
            </div>
          </div>


          <div class="clearfix">
            <div class="pull-left">
              <a id="TaskTrackingStatus_list" href="list.html" class="btn btn-default" data-th-title="#{label_goBack}" data-th-href="${@linkBuilder.of('TaskTrackingStatusesCollectionThymeleafController').to('list')}">
  	             <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
  	             <span data-th-text="#{label_back}">Back</span>
  	          </a>
            </div>
          </div>
        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  </body>

</html>
