<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="taskheadertexts-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('TaskHeadersItemTaskHeaderTextsThymeleafController')}">
    <table id="taskheadertexts-detail-table-items-to-remove-batch" data-parent-table="taskheader-entity-table" data-data-parent-id="${taskHeader != null ? taskHeader.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('taskHeader', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="taskHeader" data-th-text="#{label_taskheader_taskheadertexts_taskheader}">taskHeader</th>
              <th data-data="taskHeaderTextCode" data-th-text="#{label_taskheader_taskheadertexts_taskheadertextcode}">taskHeaderTextCode</th>
              <th data-data="counterLine" data-th-text="#{label_taskheader_taskheadertexts_counterline}">counterLine</th>
              <th data-data="headerTextTitle" data-th-text="#{label_taskheader_taskheadertexts_headertexttitle}">headerTextTitle</th>
              <th data-data="recordStatus" data-th-text="#{label_taskheader_taskheadertexts_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>taskHeader</td>
              <td>taskHeaderTextCode</td>
              <td>counterLine</td>
              <td>headerTextTitle</td>
              <td>recordStatus</td>
        </tr>
      </tbody>
    </table>
</div>
