<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="taskheader-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('TaskHeadersCollectionThymeleafController')},itemLink=${@linkBuilder.of('TaskHeadersItemThymeleafController')}">
    <table id="taskheader-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="taskType" data-th-text="#{label_taskheader_tasktype}">taskType</th>
          <th data-data="taskCode" data-th-text="#{label_taskheader_taskcode}">taskCode</th>
          <th data-data="groupCounter" data-th-text="#{label_taskheader_groupcounter}">groupCounter</th>
          <th data-data="taskTitle" data-th-text="#{label_taskheader_tasktitle}">taskTitle</th>
          <th data-data="technicalObject" data-th-text="#{label_taskheader_technicalobject}">technicalObject</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>taskType</td>
          <td>taskCode</td>
          <td>groupCounter</td>
          <td>taskTitle</td>
          <td>technicalObject</td>
        </tr>
      </tbody>
    </table>
</div>
