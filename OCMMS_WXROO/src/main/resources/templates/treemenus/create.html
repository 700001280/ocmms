<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_create_entity(#{label_treemenu})}">
      Create TreeMenu - OCMMSROO - SpringRoo Application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/build/jquery.datetimepicker.min.css}" />

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">
        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('TreeMenusCollectionThymeleafController')}">

          <h1 data-th-text="#{label_create_entity(#{label_treemenu})}">Create TreeMenu</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${treeMenu}" data-th-action="${collectionLink.to('create').with('treeMenu', treeMenu.id)}">

            <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_treemenu})}">TreeMenu data </legend>

<div class="form-group has-error has-feedback" data-z="ddef8d6" id="treemenu-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_treemenu_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_treemenu_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="a255eed6" id="treemenu-urllink-field" data-th-classappend="${#fields.hasErrors('urlLink')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="urlLink" class="col-md-3 control-label" data-th-text="#{label_treemenu_urllink}">urlLink</label>
  <div class="col-md-6">
    <input id="urlLink" name="urlLink" data-th-value="*{{urlLink}}" type="text" class="form-control" placeholder="urlLink" data-th-placeholder="#{label_treemenu_urllink}" data-toggle="tooltip" aria-describedby="urlLinkStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('urlLink')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('urlLink')}" aria-hidden="true"></span>
      <span id="urlLink-error" class="help-block" data-th-if="${#fields.hasErrors('urlLink')}" data-th-errors="*{urlLink}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" id="treemenu-visible-field" data-z="caa1d596" data-th-classappend="${#fields.hasErrors('visible')}? 'has-error has-feedback'" data-th-class="form-group">
  <label class="col-md-3 control-label" for="visible" data-th-text="#{label_treemenu_visible}">visible</label>
  <div class="col-md-6">
    <div class="checkbox">
      <input type="checkbox" data-th-field="*{visible}" data-th-title="#{label_requiredfield}" data-toggle="tooltip" />
       <span data-th-classappend="${#fields.hasErrors('visible')}? 'form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('visible')}" aria-hidden="true"></span>
        <span id="visible-error" class="help-block" data-th-if="${#fields.hasErrors('visible')}" data-th-errors="*{visible}">Error message.</span>
    </div>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="cf757488" id="treemenu-parentmenu-field" data-th-classappend="${#fields.hasErrors('parentMenu')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('TreeMenusCollectionThymeleafController')}">
    <label for="parentMenu" class="col-md-3 control-label" data-th-text="#{label_treemenu_parentmenu}">TreeMenu</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{parentMenu}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{parentMenu} == null" data-th-value="*{parentMenu.id}" data-th-text="*{{parentMenu}}" selected="selected">TreeMenu</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('parentMenu')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('parentMenu')}" aria-hidden="true"></span>
      <span id="parentMenu-error" class="help-block" data-th-if="${#fields.hasErrors('parentMenu')}" data-th-errors="*{parentMenu}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="20a4cee8" id="treemenu-loginroles-field" data-th-classappend="${#fields.hasErrors('loginRoles')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="loginRoles" class="col-md-3 control-label" data-th-text="#{label_treemenu_loginroles}">loginRoles</label>
  <div class="col-md-6">
    <input id="loginRoles" name="loginRoles" data-th-value="*{{loginRoles}}" type="text" class="form-control" placeholder="loginRoles" data-th-placeholder="#{label_treemenu_loginroles}" data-toggle="tooltip" aria-describedby="loginRolesStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('loginRoles')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('loginRoles')}" aria-hidden="true"></span>
      <span id="loginRoles-error" class="help-block" data-th-if="${#fields.hasErrors('loginRoles')}" data-th-errors="*{loginRoles}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="97acdf08" id="treemenu-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_treemenu_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
            </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-9 col-md-offset-3">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											Inputmask
													.extendAliases({
														'numeric' : {
															'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
															'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
														},
														'currency' : {
															'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
															'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
														}
													});
										});
					})(jQuery);
  		</script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
		  </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
			</script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
			</script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
			</script>

    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											jQuery
													.extend(
															jQuery.validator.messages,
															{
																'dateformat' : /*[[#{error_invalid_date}]]*/'Please enter a correct date/time',
																'inputmask' : /*[[#{error_invalid_maskValue}]]*/'Please enter a valid value',
															});
										});
					})(jQuery);
		  </script>

    </div>

  </body>

</html>
