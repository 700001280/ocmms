<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="servicecatalog-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('ServiceCatalogsCollectionThymeleafController')},itemLink=${@linkBuilder.of('ServiceCatalogsItemThymeleafController')}">
    <table id="servicecatalog-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_servicecatalog_code}">code</th>
          <th data-data="materialName" data-th-text="#{label_servicecatalog_materialname}">materialName</th>
          <th data-data="materialGroup" data-th-text="#{label_servicecatalog_materialgroup}">materialGroup</th>
          <th data-data="recordStatus" data-th-text="#{label_servicecatalog_recordstatus}">recordStatus</th>
          <th data-data="createdDate" data-th-text="#{label_servicecatalog_createddate}">createdDate</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>materialName</td>
          <td>materialGroup</td>
          <td>recordStatus</td>
          <td>createdDate</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
