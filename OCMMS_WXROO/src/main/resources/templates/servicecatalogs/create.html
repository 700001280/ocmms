<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_create_entity(#{label_servicecatalog})}">
      Create ServiceCatalog - OCMMSROO - SpringRoo Application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/build/jquery.datetimepicker.min.css}" />

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">
        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('ServiceCatalogsCollectionThymeleafController')}">

          <h1 data-th-text="#{label_create_entity(#{label_servicecatalog})}">Create ServiceCatalog</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${serviceCatalog}" data-th-action="${collectionLink.to('create').with('serviceCatalog', serviceCatalog.id)}">

            <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_servicecatalog})}">ServiceCatalog data </legend>

<div class="form-group has-error has-feedback" data-z="b943baef" id="servicecatalog-code-field" data-th-classappend="${#fields.hasErrors('code')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="code" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_code}">code</label>
  <div class="col-md-6">
    <input id="code" name="code" data-th-value="*{{code}}" type="text" class="form-control" placeholder="code" data-th-placeholder="#{label_servicecatalog_code}" data-toggle="tooltip" aria-describedby="codeStatus" />
      <span data-th-classappend="${#fields.hasErrors('code')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('code')}" aria-hidden="true"></span>
      <span id="code-error" class="help-block" data-th-if="${#fields.hasErrors('code')}" data-th-errors="*{code}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="95ddc26f" id="servicecatalog-materialname-field" data-th-classappend="${#fields.hasErrors('materialName')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="materialName" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_materialname}">materialName</label>
  <div class="col-md-6">
    <input id="materialName" name="materialName" data-th-value="*{{materialName}}" type="text" class="form-control" placeholder="materialName" data-th-placeholder="#{label_servicecatalog_materialname}" data-toggle="tooltip" aria-describedby="materialNameStatus" />
      <span data-th-classappend="${#fields.hasErrors('materialName')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('materialName')}" aria-hidden="true"></span>
      <span id="materialName-error" class="help-block" data-th-if="${#fields.hasErrors('materialName')}" data-th-errors="*{materialName}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="c5a79b0f" id="servicecatalog-materialgroup-field" data-th-classappend="${#fields.hasErrors('materialGroup')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="materialGroup" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_materialgroup}">materialGroup</label>
  <div class="col-md-6">
    <input id="materialGroup" name="materialGroup" data-th-value="*{{materialGroup}}" type="text" class="form-control" placeholder="materialGroup" data-th-placeholder="#{label_servicecatalog_materialgroup}" data-toggle="tooltip" aria-describedby="materialGroupStatus" />
      <span data-th-classappend="${#fields.hasErrors('materialGroup')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('materialGroup')}" aria-hidden="true"></span>
      <span id="materialGroup-error" class="help-block" data-th-if="${#fields.hasErrors('materialGroup')}" data-th-errors="*{materialGroup}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="692f944f" id="servicecatalog-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="7a84cf" id="servicecatalog-category-field" data-th-classappend="${#fields.hasErrors('category')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="category" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_category}">category</label>
  <div class="col-md-6">
    <input id="category" name="category" data-th-value="*{{category}}" type="text" class="form-control" placeholder="category" data-th-placeholder="#{label_servicecatalog_category}" data-toggle="tooltip" aria-describedby="categoryStatus" />
      <span data-th-classappend="${#fields.hasErrors('category')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('category')}" aria-hidden="true"></span>
      <span id="category-error" class="help-block" data-th-if="${#fields.hasErrors('category')}" data-th-errors="*{category}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="cce7ca6f" id="servicecatalog-purpose-field" data-th-classappend="${#fields.hasErrors('purpose')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="purpose" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_purpose}">purpose</label>
  <div class="col-md-6">
    <input id="purpose" name="purpose" data-th-value="*{{purpose}}" type="text" class="form-control" placeholder="purpose" data-th-placeholder="#{label_servicecatalog_purpose}" data-toggle="tooltip" aria-describedby="purposeStatus" />
      <span data-th-classappend="${#fields.hasErrors('purpose')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('purpose')}" aria-hidden="true"></span>
      <span id="purpose-error" class="help-block" data-th-if="${#fields.hasErrors('purpose')}" data-th-errors="*{purpose}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="df8894cf" id="servicecatalog-generalledgeraccount-field" data-th-classappend="${#fields.hasErrors('generalLedgerAccount')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="generalLedgerAccount" class="col-md-3 control-label" data-th-text="#{label_servicecatalog_generalledgeraccount}">generalLedgerAccount</label>
  <div class="col-md-6">
    <input id="generalLedgerAccount" name="generalLedgerAccount" data-th-value="*{{generalLedgerAccount}}" type="text" class="form-control" placeholder="generalLedgerAccount" data-th-placeholder="#{label_servicecatalog_generalledgeraccount}" data-toggle="tooltip" aria-describedby="generalLedgerAccountStatus" />
      <span data-th-classappend="${#fields.hasErrors('generalLedgerAccount')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('generalLedgerAccount')}" aria-hidden="true"></span>
      <span id="generalLedgerAccount-error" class="help-block" data-th-if="${#fields.hasErrors('generalLedgerAccount')}" data-th-errors="*{generalLedgerAccount}">Error message.</span>
  </div>
</div>
            </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-9 col-md-offset-3">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											Inputmask
													.extendAliases({
														'numeric' : {
															'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
															'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
														},
														'currency' : {
															'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
															'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
														}
													});
										});
					})(jQuery);
  		</script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
		  </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
			</script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
			</script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
			</script>

    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											jQuery
													.extend(
															jQuery.validator.messages,
															{
																'dateformat' : /*[[#{error_invalid_date}]]*/'Please enter a correct date/time',
																'inputmask' : /*[[#{error_invalid_maskValue}]]*/'Please enter a valid value',
															});
										});
					})(jQuery);
		  </script>

    </div>

  </body>

</html>
