<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-list-layout}">
  <head id="head">

    <title data-th-text="|#{label_show_entity(#{label_lotoissuereport})}|">Show LotoIssueReport - Spring Roo application</title>

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!--CONTAINER-->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content" data-th-object="${lotoIssueReport}">
        <div class="container-fluid content">

          <!-- CONTENT -->
          <h1 data-th-text="#{label_show_entity(#{label_lotoissuereport})}">Show LotoIssueReport</h1>

            <div id="mainEntityFieldSet">
              <h2 data-th-text="#{label_data_entity(#{label_lotoissuereport})}">LotoIssueReport data</h2>
              <ul class="list-unstyled" id="containerFields">
                  <li id="lotoissuereport-lotoinfo-field" data-z="e49e4284">
            	      <strong data-th-text="#{label_lotoissuereport_lotoinfo}">lotoInfo</strong>
                    <span data-th-text="*{{lotoInfo}}">lotoInfoValue</span>
         	        </li>
                  <li id="lotoissuereport-description-field" data-z="1fa52b3a">
            	      <strong data-th-text="#{label_lotoissuereport_description}">description</strong>
                    <span data-th-text="*{{description}}">descriptionValue</span>
         	        </li>
                  <li id="lotoissuereport-recordstatus-field" data-z="beacf924">
            	      <strong data-th-text="#{label_lotoissuereport_recordstatus}">recordStatus</strong>
                    <span data-th-text="*{{recordStatus}}">recordStatusValue</span>
         	        </li>
                  <li id="lotoissuereport-createddate-field" data-z="2e1dac1a">
            	      <strong data-th-text="#{label_lotoissuereport_createddate}">createdDate</strong>
                    <span data-th-text="*{{createdDate}}">createdDateValue</span>
         	        </li>
                  <li id="lotoissuereport-createdby-field" data-z="271ddba">
            	      <strong data-th-text="#{label_lotoissuereport_createdby}">createdBy</strong>
                    <span data-th-text="*{{createdBy}}">createdByValue</span>
         	        </li>
                  <li id="lotoissuereport-lastmodifieddate-field" data-z="f0b0e984">
            	      <strong data-th-text="#{label_lotoissuereport_lastmodifieddate}">lastModifiedDate</strong>
                    <span data-th-text="*{{lastModifiedDate}}">lastModifiedDateValue</span>
         	        </li>
                  <li id="lotoissuereport-lastmodifiedby-field" data-z="74a96da4">
            	      <strong data-th-text="#{label_lotoissuereport_lastmodifiedby}">lastModifiedBy</strong>
                    <span data-th-text="*{{lastModifiedBy}}">lastModifiedByValue</span>
         	        </li>
              </ul>
            </div>


          <div class="clearfix">
            <div class="pull-right">
             <a id="LotoIssueReport_edit" href="edit.html" class="btn btn-primary" data-th-title="#{label_goEdit}" data-th-href="${@linkBuilder.of('LotoIssueReportsItemThymeleafController').to('editForm').with('lotoIssueReport', lotoIssueReport.id)}" data-th-text="#{label_edit}">Edit</a>
            </div>
          </div>


          <div class="clearfix">
            <div class="pull-left">
              <a id="LotoIssueReport_list" href="list.html" class="btn btn-default" data-th-title="#{label_goBack}" data-th-href="${@linkBuilder.of('LotoIssueReportsCollectionThymeleafController').to('list')}">
  	             <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
  	             <span data-th-text="#{label_back}">Back</span>
  	          </a>
            </div>
          </div>
        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">
  </div>

  </body>

</html>
