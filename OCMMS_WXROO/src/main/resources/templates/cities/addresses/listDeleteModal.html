<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="addresses-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('CitiesItemAddressesThymeleafController')}">
    <table id="addresses-detail-table-item-to-remove" data-parent-table="city-entity-table" data-data-parent-id="${city != null ? city.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('city', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="description" data-th-text="#{label_city_addresses_description}">description</th>
              <th data-data="city" data-th-text="#{label_city_addresses_city}">city</th>
              <th data-data="recordStatus" data-th-text="#{label_city_addresses_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>description</td>
              <td>city</td>
              <td>recordStatus</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
