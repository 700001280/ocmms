<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_edit_entity(#{label_workordertimesheet})}">
    Edit WorkOrderTimeSheet - Spring Roo application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/2.5.4/build/jquery.datetimepicker.min.css}" />

  </head>
  

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">

        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('WorkOrderTimeSheetsCollectionThymeleafController')},itemLink=${@linkBuilder.of('WorkOrderTimeSheetsItemThymeleafController')}">

          <h1 data-th-text="#{label_edit_entity(#{label_workordertimesheet})}">Edit WorkOrderTimeSheet</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${workOrderTimeSheet}" data-th-action="${itemLink.to('update').with('workOrderTimeSheet', workOrderTimeSheet.id)}">
            <input type="hidden" name="_method" value="PUT" />
            	<input type="hidden" name="version" data-th-value="*{version}" />

            <!-- CONCURRENCY CONTROL -->
            <div data-th-replace="~{fragments/concurrency-control :: concurrency-control(editFormUrl = ${itemLink.to('editForm').with('workOrderTimeSheet', workOrderTimeSheet.id)})}"></div>
            <!-- /CONCURRENCY CONTROL -->

             <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_workordertimesheet})}">WorkOrderTimeSheet data </legend>

<div class="form-group has-error has-feedback" data-z="f0b6a400" id="workordertimesheet-workorderoperation-field" data-th-classappend="${#fields.hasErrors('workOrderOperation')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('WorkOrderOperationsCollectionThymeleafController')}">
    <label for="workOrderOperation" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_workorderoperation}">WorkOrderOperation</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{workOrderOperation}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{workOrderOperation} == null" data-th-value="*{workOrderOperation.id}" data-th-text="*{{workOrderOperation}}" selected="selected">WorkOrderOperation</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('workOrderOperation')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('workOrderOperation')}" aria-hidden="true"></span>
      <span id="workOrderOperation-error" class="help-block" data-th-if="${#fields.hasErrors('workOrderOperation')}" data-th-errors="*{workOrderOperation}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="3ae08700" id="workordertimesheet-worker-field" data-th-classappend="${#fields.hasErrors('worker')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')}">
    <label for="worker" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_worker}">Employee</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{worker}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{worker} == null" data-th-value="*{worker.id}" data-th-text="*{{worker}}" selected="selected">Employee</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('worker')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('worker')}" aria-hidden="true"></span>
      <span id="worker-error" class="help-block" data-th-if="${#fields.hasErrors('worker')}" data-th-errors="*{worker}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="6a367e7e" id="workordertimesheet-workhours-field" data-th-classappend="${#fields.hasErrors('workHours')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="workHours" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_workhours}">workHours</label>
  <div class="col-md-3">
    <input id="workHours" name="workHours" data-th-value="*{{workHours}}" type="text" class="form-control inputmask" placeholder="workHours" data-th-placeholder="#{label_workordertimesheet_workhours}" data-toggle="tooltip" aria-describedby="workHoursStatus" data-inputmask-alias="numeric" data-inputmask-digits="2" required="required" />
      <span data-th-classappend="${#fields.hasErrors('workHours')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('workHours')}" aria-hidden="true"></span>
      <span id="workHours-error" class="help-block" data-th-if="${#fields.hasErrors('workHours')}" data-th-errors="*{workHours}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" id="workordertimesheet-workdate-field" data-z="ca090ac0" data-th-classappend="${#fields.hasErrors('workDate')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="workDate" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_workdate}">workDate</label>
  <div class="col-md-3">
    <input id="workDate" name="workDate" data-th-value="*{{workDate}}" type="text" class="form-control datetimepicker" placeholder="workDate" data-th-placeholder="#{label_workordertimesheet_workdate}" data-th-attr="data-dateformat=${workDate_date_format}" data-toggle="tooltip" /> <span data-th-classappend="${#fields.hasErrors('workDate')}? 'glyphicon glyphicon-remove form-control-feedback'" data-th-if="${#fields.hasErrors('workDate')}" aria-hidden="true"></span>
     <span id="workDate-error" class="help-block" data-th-if="${#fields.hasErrors('workDate')}" data-th-errors="*{workDate}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="99d225e0" id="workordertimesheet-approver-field" data-th-classappend="${#fields.hasErrors('approver')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')}">
    <label for="approver" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_approver}">Employee</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{approver}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{approver} == null" data-th-value="*{approver.id}" data-th-text="*{{approver}}" selected="selected">Employee</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('approver')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('approver')}" aria-hidden="true"></span>
      <span id="approver-error" class="help-block" data-th-if="${#fields.hasErrors('approver')}" data-th-errors="*{approver}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" id="workordertimesheet-approvedate-field" data-z="cfb6875e" data-th-classappend="${#fields.hasErrors('approveDate')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="approveDate" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_approvedate}">approveDate</label>
  <div class="col-md-3">
    <input id="approveDate" name="approveDate" data-th-value="*{{approveDate}}" type="text" class="form-control datetimepicker" placeholder="approveDate" data-th-placeholder="#{label_workordertimesheet_approvedate}" data-th-attr="data-dateformat=${approveDate_date_format}" data-toggle="tooltip" /> <span data-th-classappend="${#fields.hasErrors('approveDate')}? 'glyphicon glyphicon-remove form-control-feedback'" data-th-if="${#fields.hasErrors('approveDate')}" aria-hidden="true"></span>
     <span id="approveDate-error" class="help-block" data-th-if="${#fields.hasErrors('approveDate')}" data-th-errors="*{approveDate}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="5652f1c0" id="workordertimesheet-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_workordertimesheet_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
             </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-12">
                  <div class="pull-left">
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                  </div>
                  <div class="pull-right">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                  </div>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
   </div>
   <!-- /CONTAINER -->

   <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
   </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
        jQuery(document).ready(
      	  function() {
      	    Inputmask.extendAliases({
      	      'numeric' : {
      	         'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
      	         'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
      	       },
      	       'currency' : {
      	          'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
      	          'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
      	        }
      	    });
      	 });
       })(jQuery);
    </script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
      </script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
      </script>
    <!-- Concurrency control management -->
    <script data-th-src="@{/public/js/concurrency-control.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
         jQuery(document).ready(function() {
      	   jQuery.extend( jQuery.validator.messages, {
      	     'dateformat' : /*[[#{error_invalid_date}]]*/ 'Please enter a correct date/time',
      	     'inputmask': /*[[#{error_invalid_maskValue}]]*/ 'Please enter a valid value',
      	   });
      	 });
      })(jQuery);
      </script>

    </div>

  </body>

</html>
