<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="measuringrecords-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('EquipmentsItemMeasuringRecordsThymeleafController')}">
    <table id="measuringrecords-detail-table-item-to-remove" data-parent-table="equipment-entity-table" data-data-parent-id="${equipment != null ? equipment.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('equipment', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="measuringPoint" data-th-text="#{label_equipment_measuringrecords_measuringpoint}">measuringPoint</th>
              <th data-data="measuringDate" data-th-text="#{label_equipment_measuringrecords_measuringdate}">measuringDate</th>
              <th data-data="measuringValue" data-th-text="#{label_equipment_measuringrecords_measuringvalue}">measuringValue</th>
              <th data-data="description" data-th-text="#{label_equipment_measuringrecords_description}">description</th>
              <th data-data="recorder" data-th-text="#{label_equipment_measuringrecords_recorder}">recorder</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>measuringPoint</td>
              <td>measuringDate</td>
              <td>measuringValue</td>
              <td>description</td>
              <td>recorder</td>
        </tr>
      </tbody>
    </table>
</div>
