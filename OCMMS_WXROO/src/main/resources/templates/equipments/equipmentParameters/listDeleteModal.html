<div class="table-responsive" id="containerFields" data-th-fragment="equipmentparameters-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('EquipmentsItemEquipmentParametersThymeleafController')}">
    <table id="equipmentparameters-detail-table-item-to-remove" data-parent-table="equipment-entity-table" data-data-parent-id="${equipment != null ? equipment.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('equipment', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="parameterName" data-th-text="#{label_equipment_equipmentparameters_parametername}">parameterName</th>
              <th data-data="description" data-th-text="#{label_equipment_equipmentparameters_description}">description</th>
              <th data-data="unit" data-th-text="#{label_equipment_equipmentparameters_unit}">unit</th>
              <th data-data="recordStatus" data-th-text="#{label_equipment_equipmentparameters_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>parameterName</td>
              <td>description</td>
              <td>unit</td>
              <td>recordStatus</td>
        </tr>
      </tbody>
    </table>
</div>
