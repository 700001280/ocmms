<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="notificationitems-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('NotificationHeadersItemNotificationItemsThymeleafController')}">
    <table id="notificationitems-detail-table-items-to-remove-batch" data-parent-table="notificationheader-entity-table" data-data-parent-id="${notificationHeader != null ? notificationHeader.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('notificationHeader', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="notificationHeader" data-th-text="#{label_notificationheader_notificationitems_notificationheader}">notificationHeader</th>
              <th data-data="failureObjectPart" data-th-text="#{label_notificationheader_notificationitems_failureobjectpart}">failureObjectPart</th>
              <th data-data="failureDamageType" data-th-text="#{label_notificationheader_notificationitems_failuredamagetype}">failureDamageType</th>
              <th data-data="failureDamageCause" data-th-text="#{label_notificationheader_notificationitems_failuredamagecause}">failureDamageCause</th>
              <th data-data="failureDescription" data-th-text="#{label_notificationheader_notificationitems_failuredescription}">failureDescription</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>notificationHeader</td>
              <td>failureObjectPart</td>
              <td>failureDamageType</td>
              <td>failureDamageCause</td>
              <td>failureDescription</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
