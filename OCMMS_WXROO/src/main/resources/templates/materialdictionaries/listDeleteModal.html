<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="materialdictionary-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('MaterialDictionariesCollectionThymeleafController')},itemLink=${@linkBuilder.of('MaterialDictionariesItemThymeleafController')}">
    <table id="materialdictionary-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="materialClass" data-th-text="#{label_materialdictionary_materialclass}">materialClass</th>
          <th data-data="itemRef" data-th-text="#{label_materialdictionary_itemref}">itemRef</th>
          <th data-data="classDefinition" data-th-text="#{label_materialdictionary_classdefinition}">classDefinition</th>
          <th data-data="unspsc" data-th-text="#{label_materialdictionary_unspsc}">unspsc</th>
          <th data-data="directMaterial" data-th-text="#{label_materialdictionary_directmaterial}">directMaterial</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>materialClass</td>
          <td>itemRef</td>
          <td>classDefinition</td>
          <td>unspsc</td>
          <td>directMaterial</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
