<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_edit_entity(#{label_workorderoperation})}">
    Edit WorkOrderOperation - Spring Roo application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/2.5.4/build/jquery.datetimepicker.min.css}" />

  </head>
  

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">

        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('WorkOrderOperationsCollectionThymeleafController')},itemLink=${@linkBuilder.of('WorkOrderOperationsItemThymeleafController')}">

          <h1 data-th-text="#{label_edit_entity(#{label_workorderoperation})}">Edit WorkOrderOperation</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${workOrderOperation}" data-th-action="${itemLink.to('update').with('workOrderOperation', workOrderOperation.id)}">
            <input type="hidden" name="_method" value="PUT" />
            	<input type="hidden" name="version" data-th-value="*{version}" />

            <!-- CONCURRENCY CONTROL -->
            <div data-th-replace="~{fragments/concurrency-control :: concurrency-control(editFormUrl = ${itemLink.to('editForm').with('workOrderOperation', workOrderOperation.id)})}"></div>
            <!-- /CONCURRENCY CONTROL -->

             <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_workorderoperation})}">WorkOrderOperation data </legend>

<div class="form-group has-error has-feedback" data-z="fec30cc9" id="workorderoperation-workorder-field" data-th-classappend="${#fields.hasErrors('workOrder')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('WorkOrderHeadersCollectionThymeleafController')}">
    <label for="workOrder" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_workorder}">WorkOrderHeader</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{workOrder}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{workOrder} == null" data-th-value="*{workOrder.id}" data-th-text="*{{workOrder}}" selected="selected">WorkOrderHeader</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('workOrder')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('workOrder')}" aria-hidden="true"></span>
      <span id="workOrder-error" class="help-block" data-th-if="${#fields.hasErrors('workOrder')}" data-th-errors="*{workOrder}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="a18f06c9" id="workorderoperation-operationalworkcenter-field" data-th-classappend="${#fields.hasErrors('operationalWorkCenter')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('OperationalWorkCentersCollectionThymeleafController')}">
    <label for="operationalWorkCenter" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_operationalworkcenter}">OperationalWorkCenter</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{operationalWorkCenter}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{operationalWorkCenter} == null" data-th-value="*{operationalWorkCenter.id}" data-th-text="*{{operationalWorkCenter}}" selected="selected">OperationalWorkCenter</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('operationalWorkCenter')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('operationalWorkCenter')}" aria-hidden="true"></span>
      <span id="operationalWorkCenter-error" class="help-block" data-th-if="${#fields.hasErrors('operationalWorkCenter')}" data-th-errors="*{operationalWorkCenter}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="9df091c9" id="workorderoperation-operationrelationship-field" data-th-classappend="${#fields.hasErrors('operationRelationship')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('OperationRelationshipsCollectionThymeleafController')}">
    <label for="operationRelationship" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_operationrelationship}">OperationRelationship</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{operationRelationship}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{operationRelationship} == null" data-th-value="*{operationRelationship.id}" data-th-text="*{{operationRelationship}}" selected="selected">OperationRelationship</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('operationRelationship')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('operationRelationship')}" aria-hidden="true"></span>

    </div>
</div>
<div class="form-group has-error has-feedback" data-z="dcd56a89" id="workorderoperation-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_workorderoperation_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="75341b35" id="workorderoperation-workernumber-field" data-th-classappend="${#fields.hasErrors('workerNumber')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="workerNumber" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_workernumber}">workerNumber</label>
  <div class="col-md-3">
    <input id="workerNumber" name="workerNumber" data-th-value="*{{workerNumber}}" type="text" class="form-control inputmask" placeholder="workerNumber" data-th-placeholder="#{label_workorderoperation_workernumber}" data-toggle="tooltip" aria-describedby="workerNumberStatus" data-inputmask-alias="numeric" data-inputmask-digits="0" required="required" />
      <span data-th-classappend="${#fields.hasErrors('workerNumber')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('workerNumber')}" aria-hidden="true"></span>
      <span id="workerNumber-error" class="help-block" data-th-if="${#fields.hasErrors('workerNumber')}" data-th-errors="*{workerNumber}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="56ec8bc9" id="workorderoperation-planworkerhours-field" data-th-classappend="${#fields.hasErrors('planWorkerHours')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="planWorkerHours" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_planworkerhours}">planWorkerHours</label>
  <div class="col-md-3">
    <input id="planWorkerHours" name="planWorkerHours" data-th-value="*{{planWorkerHours}}" type="text" class="form-control inputmask" placeholder="planWorkerHours" data-th-placeholder="#{label_workorderoperation_planworkerhours}" data-toggle="tooltip" aria-describedby="planWorkerHoursStatus" data-inputmask-alias="numeric" data-inputmask-digits="2" required="required" />
      <span data-th-classappend="${#fields.hasErrors('planWorkerHours')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('planWorkerHours')}" aria-hidden="true"></span>
      <span id="planWorkerHours-error" class="help-block" data-th-if="${#fields.hasErrors('planWorkerHours')}" data-th-errors="*{planWorkerHours}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="a784a3b5" id="workorderoperation-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_workorderoperation_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
             </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-12">
                  <div class="pull-left">
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                  </div>
                  <div class="pull-right">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                  </div>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
   </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>

      </script>

    <script data-th-src="@{/public/js/concurrency-control.js}"></script>
