<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="plant-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('PlantsCollectionThymeleafController')},itemLink=${@linkBuilder.of('PlantsItemThymeleafController')}">
    <table id="plant-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_plant_code}">code</th>
          <th data-data="orgName" data-th-text="#{label_plant_orgname}">orgName</th>
          <th data-data="description" data-th-text="#{label_plant_description}">description</th>
          <th data-data="postalCode" data-th-text="#{label_plant_postalcode}">postalCode</th>
          <th data-data="phone" data-th-text="#{label_plant_phone}">phone</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>orgName</td>
          <td>description</td>
          <td>postalCode</td>
          <td>phone</td>
        </tr>
      </tbody>
    </table>
</div>
