        <tr>
              <th data-data="plant" data-th-text="#{label_plant_plantsections_plant}">plant</th>

              <th data-data="section" data-th-text="#{label_plant_plantsections_section}">section</th>
              <th data-data="sectionPhoneNumber" data-th-text="#{label_plant_plantsections_sectionphonenumber}">sectionPhoneNumber</th>
              <th data-data="recordStatus" data-th-text="#{label_plant_plantsections_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>plant</td>
              <td>description</td>
              <td>section</td>
              <td>sectionPhoneNumber</td>
              <td>recordStatus</td>
        </tr>
