<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_edit_entity(#{label_worklog})}">
    Edit WorkLog - Spring Roo application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/2.5.4/build/jquery.datetimepicker.min.css}" />

  </head>
  

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">

        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('WorkLogsCollectionThymeleafController')},itemLink=${@linkBuilder.of('WorkLogsItemThymeleafController')}">

          <h1 data-th-text="#{label_edit_entity(#{label_worklog})}">Edit WorkLog</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${workLog}" data-th-action="${itemLink.to('update').with('workLog', workLog.id)}">
            <input type="hidden" name="_method" value="PUT" />
            	<input type="hidden" name="version" data-th-value="*{version}" />

            <!-- CONCURRENCY CONTROL -->
            <div data-th-replace="~{fragments/concurrency-control :: concurrency-control(editFormUrl = ${itemLink.to('editForm').with('workLog', workLog.id)})}"></div>
            <!-- /CONCURRENCY CONTROL -->

             <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_worklog})}">WorkLog data </legend>

<div class="form-group has-error has-feedback" data-z="544ddb76" id="worklog-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_worklog_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_worklog_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" id="worklog-logdate-field" data-z="38a5e456" data-th-classappend="${#fields.hasErrors('logDate')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="logDate" class="col-md-3 control-label" data-th-text="#{label_worklog_logdate}">logDate</label>
  <div class="col-md-3">
    <input id="logDate" name="logDate" data-th-value="*{{logDate}}" type="text" class="form-control datetimepicker" placeholder="logDate" data-th-placeholder="#{label_worklog_logdate}" data-th-attr="data-dateformat=${logDate_date_format}" data-toggle="tooltip" /> <span data-th-classappend="${#fields.hasErrors('logDate')}? 'glyphicon glyphicon-remove form-control-feedback'" data-th-if="${#fields.hasErrors('logDate')}" aria-hidden="true"></span>
     <span id="logDate-error" class="help-block" data-th-if="${#fields.hasErrors('logDate')}" data-th-errors="*{logDate}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="8d6e2156" id="worklog-worklogtype-field" data-th-classappend="${#fields.hasErrors('workLogType')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('WorkLogTypesCollectionThymeleafController')}">
    <label for="workLogType" class="col-md-3 control-label" data-th-text="#{label_worklog_worklogtype}">WorkLogType</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{workLogType}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{workLogType} == null" data-th-value="*{workLogType.id}" data-th-text="*{{workLogType}}" selected="selected">WorkLogType</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('workLogType')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('workLogType')}" aria-hidden="true"></span>
      <span id="workLogType-error" class="help-block" data-th-if="${#fields.hasErrors('workLogType')}" data-th-errors="*{workLogType}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" id="worklog-assign-field" data-z="ec8e1988" data-th-classappend="${#fields.hasErrors('assign')}? 'has-error has-feedback'" data-th-class="form-group">
  <label class="col-md-3 control-label" for="assign" data-th-text="#{label_worklog_assign}">assign</label>
  <div class="col-md-6">
    <div class="checkbox">
      <input type="checkbox" data-th-field="*{assign}" data-th-title="#{label_requiredfield}" data-toggle="tooltip" />
       <span data-th-classappend="${#fields.hasErrors('assign')}? 'form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('assign')}" aria-hidden="true"></span>
        <span id="assign-error" class="help-block" data-th-if="${#fields.hasErrors('assign')}" data-th-errors="*{assign}">Error message.</span>
    </div>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="4e500b68" id="worklog-remark-field" data-th-classappend="${#fields.hasErrors('remark')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="remark" class="col-md-3 control-label" data-th-text="#{label_worklog_remark}">remark</label>
  <div class="col-md-6">
    <input id="remark" name="remark" data-th-value="*{{remark}}" type="text" class="form-control" placeholder="remark" data-th-placeholder="#{label_worklog_remark}" data-toggle="tooltip" aria-describedby="remarkStatus" />
      <span data-th-classappend="${#fields.hasErrors('remark')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('remark')}" aria-hidden="true"></span>
      <span id="remark-error" class="help-block" data-th-if="${#fields.hasErrors('remark')}" data-th-errors="*{remark}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="b9720968" id="worklog-logger-field" data-th-classappend="${#fields.hasErrors('logger')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')}">
    <label for="logger" class="col-md-3 control-label" data-th-text="#{label_worklog_logger}">Employee</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{logger}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{logger} == null" data-th-value="*{logger.id}" data-th-text="*{{logger}}" selected="selected">Employee</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('logger')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('logger')}" aria-hidden="true"></span>
      <span id="logger-error" class="help-block" data-th-if="${#fields.hasErrors('logger')}" data-th-errors="*{logger}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="1f1a5068" id="worklog-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_worklog_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
             </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-12">
                  <div class="pull-left">
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                  </div>
                  <div class="pull-right">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                  </div>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
   </div>
   <!-- /CONTAINER -->

   <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
   </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
        jQuery(document).ready(
      	  function() {
      	    Inputmask.extendAliases({
      	      'numeric' : {
      	         'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
      	         'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
      	       },
      	       'currency' : {
      	          'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
      	          'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
      	        }
      	    });
      	 });
       })(jQuery);
    </script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
      </script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
      </script>
    <!-- Concurrency control management -->
    <script data-th-src="@{/public/js/concurrency-control.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
         jQuery(document).ready(function() {
      	   jQuery.extend( jQuery.validator.messages, {
      	     'dateformat' : /*[[#{error_invalid_date}]]*/ 'Please enter a correct date/time',
      	     'inputmask': /*[[#{error_invalid_maskValue}]]*/ 'Please enter a valid value',
      	   });
      	 });
      })(jQuery);
      </script>

    </div>

  </body>

</html>
