<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="imagedocument-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('ImageDocumentsCollectionThymeleafController')},itemLink=${@linkBuilder.of('ImageDocumentsItemThymeleafController')}">
    <table id="imagedocument-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="fileName" data-th-text="#{label_imagedocument_filename}">fileName</th>
          <th data-data="description" data-th-text="#{label_imagedocument_description}">description</th>
          <th data-data="fileType" data-th-text="#{label_imagedocument_filetype}">fileType</th>
          <th data-data="imageEncode" data-th-text="#{label_imagedocument_imageencode}">imageEncode</th>
          <th data-data="uploadDate" data-th-text="#{label_imagedocument_uploaddate}">uploadDate</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>fileName</td>
          <td>description</td>
          <td>fileType</td>
          <td>imageEncode</td>
          <td>uploadDate</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
