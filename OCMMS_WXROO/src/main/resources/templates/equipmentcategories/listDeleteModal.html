        <tr>
          <th data-data="code" data-th-text="#{label_equipmentcategory_code}">code</th>
          <th data-data="description" data-th-text="#{label_equipmentcategory_description}">description</th>
          <th data-data="recordStatus" data-th-text="#{label_equipmentcategory_recordstatus}">recordStatus</th>
          <th data-data="createdDate" data-th-text="#{label_equipmentcategory_createddate}">createdDate</th>
          <th data-data="createdBy" data-th-text="#{label_equipmentcategory_createdby}">createdBy</th>

      <tbody data-th-remove="all">

          <td>code</td>
          <td>description</td>
