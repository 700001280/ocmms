        <tr>
              <th data-data="department" data-th-text="#{label_department_maintworkcenters_department}">department</th>

              <th data-data="category" data-th-text="#{label_department_maintworkcenters_category}">category</th>
              <th data-data="name" data-th-text="#{label_department_maintworkcenters_name}">name</th>
              <th data-data="responsible" data-th-text="#{label_department_maintworkcenters_responsible}">responsible</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>department</td>
              <td>code</td>
              <td>category</td>
              <td>name</td>
              <td>responsible</td>
        </tr>
      </tbody>
