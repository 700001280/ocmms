<div class="table-responsive" id="containerFields" data-th-fragment="measuringrecord-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('MeasuringRecordsCollectionThymeleafController')},itemLink=${@linkBuilder.of('MeasuringRecordsItemThymeleafController')}">
    <table id="measuringrecord-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="measuringPoint" data-th-text="#{label_measuringrecord_measuringpoint}">measuringPoint</th>
          <th data-data="measuringDate" data-th-text="#{label_measuringrecord_measuringdate}">measuringDate</th>
          <th data-data="measuringValue" data-th-text="#{label_measuringrecord_measuringvalue}">measuringValue</th>
          <th data-data="description" data-th-text="#{label_measuringrecord_description}">description</th>
          <th data-data="recorder" data-th-text="#{label_measuringrecord_recorder}">recorder</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>measuringPoint</td>
          <td>measuringDate</td>
          <td>measuringValue</td>
          <td>description</td>
          <td>recorder</td>
        </tr>
      </tbody>
    </table>
</div>
