<div class="table-responsive" id="containerFields" data-th-fragment="hoist-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('HoistsCollectionThymeleafController')},itemLink=${@linkBuilder.of('HoistsItemThymeleafController')}">
    <table id="hoist-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="tag" data-th-text="#{label_hoist_tag}">tag</th>
          <th data-data="description" data-th-text="#{label_hoist_description}">description</th>
          <th data-data="descriptionLocal" data-th-text="#{label_hoist_descriptionlocal}">descriptionLocal</th>
          <th data-data="abcIndicator" data-th-text="#{label_hoist_abcindicator}">abcIndicator</th>
          <th data-data="mainWorkCenter" data-th-text="#{label_hoist_mainworkcenter}">mainWorkCenter</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>tag</td>
          <td>description</td>
          <td>descriptionLocal</td>
          <td>abcIndicator</td>
          <td>mainWorkCenter</td>
        </tr>
      </tbody>
    </table>
