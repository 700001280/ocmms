<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="provinces-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('RegionsItemProvincesThymeleafController')}">
    <table id="provinces-detail-table-items-to-remove-batch" data-parent-table="region-entity-table" data-data-parent-id="${region != null ? region.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('region', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="description" data-th-text="#{label_region_provinces_description}">description</th>
              <th data-data="region" data-th-text="#{label_region_provinces_region}">region</th>
              <th data-data="recordStatus" data-th-text="#{label_region_provinces_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>description</td>
              <td>region</td>
              <td>recordStatus</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
