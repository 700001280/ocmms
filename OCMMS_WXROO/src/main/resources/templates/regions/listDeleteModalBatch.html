<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="region-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('RegionsCollectionThymeleafController')},itemLink=${@linkBuilder.of('RegionsItemThymeleafController')}">
    <table id="region-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="description" data-th-text="#{label_region_description}">description</th>
          <th data-data="country" data-th-text="#{label_region_country}">country</th>
          <th data-data="recordStatus" data-th-text="#{label_region_recordstatus}">recordStatus</th>
          <th data-data="createdDate" data-th-text="#{label_region_createddate}">createdDate</th>
          <th data-data="createdBy" data-th-text="#{label_region_createdby}">createdBy</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>description</td>
          <td>country</td>
          <td>recordStatus</td>
          <td>createdDate</td>
          <td>createdBy</td>
        </tr>
      </tbody>
    </table>
</div>
