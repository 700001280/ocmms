<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="vendor-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('VendorsCollectionThymeleafController')},itemLink=${@linkBuilder.of('VendorsItemThymeleafController')}">
    <table id="vendor-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_vendor_code}">code</th>
          <th data-data="companyName" data-th-text="#{label_vendor_companyname}">companyName</th>
          <th data-data="address" data-th-text="#{label_vendor_address}">address</th>
          <th data-data="postalCode" data-th-text="#{label_vendor_postalcode}">postalCode</th>
          <th data-data="phone" data-th-text="#{label_vendor_phone}">phone</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>companyName</td>
          <td>address</td>
          <td>postalCode</td>
          <td>phone</td>
        </tr>
      </tbody>
    </table>
</div>
