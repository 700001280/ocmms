<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-list-layout}">
  <head id="head">

    <title data-th-text="|#{label_show_entity(#{label_tasktrackingtype})}|">Show TaskTrackingType - Spring Roo application</title>

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!--CONTAINER-->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content" data-th-object="${taskTrackingType}">
        <div class="container-fluid content">

          <!-- CONTENT -->
          <h1 data-th-text="#{label_show_entity(#{label_tasktrackingtype})}">Show TaskTrackingType</h1>

            <div id="mainEntityFieldSet">
              <h2 data-th-text="#{label_data_entity(#{label_tasktrackingtype})}">TaskTrackingType data</h2>
              <ul class="list-unstyled" id="containerFields">
                  <li id="tasktrackingtype-code-field" data-z="d94e7b61">
            	      <strong data-th-text="#{label_tasktrackingtype_code}">code</strong>
                    <span data-th-text="*{{code}}">codeValue</span>
         	        </li>
                  <li id="tasktrackingtype-description-field" data-z="c8c039fd">
            	      <strong data-th-text="#{label_tasktrackingtype_description}">description</strong>
                    <span data-th-text="*{{description}}">descriptionValue</span>
         	        </li>
                  <li id="tasktrackingtype-recordstatus-field" data-z="38f3c2c1">
            	      <strong data-th-text="#{label_tasktrackingtype_recordstatus}">recordStatus</strong>
                    <span data-th-text="*{{recordStatus}}">recordStatusValue</span>
         	        </li>
                  <li id="tasktrackingtype-createddate-field" data-z="d738badd">
            	      <strong data-th-text="#{label_tasktrackingtype_createddate}">createdDate</strong>
                    <span data-th-text="*{{createdDate}}">createdDateValue</span>
         	        </li>
                  <li id="tasktrackingtype-createdby-field" data-z="5577c13d">
            	      <strong data-th-text="#{label_tasktrackingtype_createdby}">createdBy</strong>
                    <span data-th-text="*{{createdBy}}">createdByValue</span>
         	        </li>
                  <li id="tasktrackingtype-lastmodifieddate-field" data-z="f10f9ca1">
            	      <strong data-th-text="#{label_tasktrackingtype_lastmodifieddate}">lastModifiedDate</strong>
                    <span data-th-text="*{{lastModifiedDate}}">lastModifiedDateValue</span>
         	        </li>
                  <li id="tasktrackingtype-lastmodifiedby-field" data-z="78644401">
            	      <strong data-th-text="#{label_tasktrackingtype_lastmodifiedby}">lastModifiedBy</strong>
                    <span data-th-text="*{{lastModifiedBy}}">lastModifiedByValue</span>
         	        </li>
              </ul>
            </div>


          <div class="clearfix">
            <div class="pull-right">
             <a id="TaskTrackingType_edit" href="edit.html" class="btn btn-primary" data-th-title="#{label_goEdit}" data-th-href="${@linkBuilder.of('TaskTrackingTypesItemThymeleafController').to('editForm').with('taskTrackingType', taskTrackingType.id)}" data-th-text="#{label_edit}">Edit</a>
            </div>
          </div>


          <div class="clearfix">
            <div class="pull-left">
              <a id="TaskTrackingType_list" href="list.html" class="btn btn-default" data-th-title="#{label_goBack}" data-th-href="${@linkBuilder.of('TaskTrackingTypesCollectionThymeleafController').to('list')}">
  	             <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
  	             <span data-th-text="#{label_back}">Back</span>
  	          </a>
            </div>
          </div>
        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  </div>

  </body>

</html>
