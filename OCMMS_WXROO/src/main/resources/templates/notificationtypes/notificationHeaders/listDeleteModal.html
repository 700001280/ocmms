<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="notificationheaders-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('NotificationTypesItemNotificationHeadersThymeleafController')}">
    <table id="notificationheaders-detail-table-item-to-remove" data-parent-table="notificationtype-entity-table" data-data-parent-id="${notificationType != null ? notificationType.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('notificationType', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="notificationCode" data-th-text="#{label_notificationtype_notificationheaders_notificationcode}">notificationCode</th>
              <th data-data="notificationType" data-th-text="#{label_notificationtype_notificationheaders_notificationtype}">notificationType</th>
              <th data-data="reportedDate" data-th-text="#{label_notificationtype_notificationheaders_reporteddate}">reportedDate</th>
              <th data-data="reportedBy" data-th-text="#{label_notificationtype_notificationheaders_reportedby}">reportedBy</th>
              <th data-data="description" data-th-text="#{label_notificationtype_notificationheaders_description}">description</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>notificationCode</td>
              <td>notificationType</td>
              <td>reportedDate</td>
              <td>reportedBy</td>
              <td>description</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
