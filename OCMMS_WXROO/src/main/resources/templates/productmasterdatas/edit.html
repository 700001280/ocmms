<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_edit_entity(#{label_productmasterdata})}">
    Edit ProductMasterData - Spring Roo application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/2.5.4/build/jquery.datetimepicker.min.css}" />

  </head>
  

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">

        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('ProductMasterDatasCollectionThymeleafController')},itemLink=${@linkBuilder.of('ProductMasterDatasItemThymeleafController')}">

          <h1 data-th-text="#{label_edit_entity(#{label_productmasterdata})}">Edit ProductMasterData</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${productMasterData}" data-th-action="${itemLink.to('update').with('productMasterData', productMasterData.id)}">
            <input type="hidden" name="_method" value="PUT" />
            	<input type="hidden" name="version" data-th-value="*{version}" />

            <!-- CONCURRENCY CONTROL -->
            <div data-th-replace="~{fragments/concurrency-control :: concurrency-control(editFormUrl = ${itemLink.to('editForm').with('productMasterData', productMasterData.id)})}"></div>
            <!-- /CONCURRENCY CONTROL -->

             <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_productmasterdata})}">ProductMasterData data </legend>

<div class="form-group has-error has-feedback" data-z="e401f6b0" id="productmasterdata-materialcode-field" data-th-classappend="${#fields.hasErrors('materialCode')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="materialCode" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_materialcode}">materialCode</label>
  <div class="col-md-6">
    <input id="materialCode" name="materialCode" data-th-value="*{{materialCode}}" type="text" class="form-control" placeholder="materialCode" data-th-placeholder="#{label_productmasterdata_materialcode}" data-toggle="tooltip" aria-describedby="materialCodeStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('materialCode')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('materialCode')}" aria-hidden="true"></span>
      <span id="materialCode-error" class="help-block" data-th-if="${#fields.hasErrors('materialCode')}" data-th-errors="*{materialCode}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="4f7b91ee" id="productmasterdata-grade-field" data-th-classappend="${#fields.hasErrors('grade')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="grade" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_grade}">grade</label>
  <div class="col-md-6">
    <input id="grade" name="grade" data-th-value="*{{grade}}" type="text" class="form-control" placeholder="grade" data-th-placeholder="#{label_productmasterdata_grade}" data-toggle="tooltip" aria-describedby="gradeStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('grade')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('grade')}" aria-hidden="true"></span>
      <span id="grade-error" class="help-block" data-th-if="${#fields.hasErrors('grade')}" data-th-errors="*{grade}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="706bd06e" id="productmasterdata-color-field" data-th-classappend="${#fields.hasErrors('color')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="color" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_color}">color</label>
  <div class="col-md-6">
    <input id="color" name="color" data-th-value="*{{color}}" type="text" class="form-control" placeholder="color" data-th-placeholder="#{label_productmasterdata_color}" data-toggle="tooltip" aria-describedby="colorStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('color')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('color')}" aria-hidden="true"></span>
      <span id="color-error" class="help-block" data-th-if="${#fields.hasErrors('color')}" data-th-errors="*{color}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="410a520e" id="productmasterdata-description-field" data-th-classappend="${#fields.hasErrors('description')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="description" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_description}">description</label>
  <div class="col-md-6">
    <input id="description" name="description" data-th-value="*{{description}}" type="text" class="form-control" placeholder="description" data-th-placeholder="#{label_productmasterdata_description}" data-toggle="tooltip" aria-describedby="descriptionStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('description')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('description')}" aria-hidden="true"></span>
      <span id="description-error" class="help-block" data-th-if="${#fields.hasErrors('description')}" data-th-errors="*{description}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="f78dc8e" id="productmasterdata-producttype-field" data-th-classappend="${#fields.hasErrors('productType')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('ProductTypesCollectionThymeleafController')}">
    <label for="productType" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_producttype}">ProductType</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{productType}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{productType} == null" data-th-value="*{productType.id}" data-th-text="*{{productType}}" selected="selected">ProductType</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('productType')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('productType')}" aria-hidden="true"></span>
      <span id="productType-error" class="help-block" data-th-if="${#fields.hasErrors('productType')}" data-th-errors="*{productType}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="dc9806ee" id="productmasterdata-shafttype-field" data-th-classappend="${#fields.hasErrors('shaftType')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('ShaftTypesCollectionThymeleafController')}">
    <label for="shaftType" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_shafttype}">ShaftType</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{shaftType}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{shaftType} == null" data-th-value="*{shaftType.id}" data-th-text="*{{shaftType}}" selected="selected">ShaftType</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('shaftType')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('shaftType')}" aria-hidden="true"></span>
      <span id="shaftType-error" class="help-block" data-th-if="${#fields.hasErrors('shaftType')}" data-th-errors="*{shaftType}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="c9ecacd0" id="productmasterdata-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_productmasterdata_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
             </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-12">
                  <div class="pull-left">
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                  </div>
                  <div class="pull-right">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                  </div>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
   </div>
   <!-- /CONTAINER -->

   <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
   </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
        jQuery(document).ready(
      	  function() {
      	    Inputmask.extendAliases({
      	      'numeric' : {
      	         'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
      	         'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
      	       },
      	       'currency' : {
      	          'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
      	          'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
      	        }
      	    });
      	 });
       })(jQuery);
    </script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
      </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
      </script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
      </script>
    <!-- Concurrency control management -->
    <script data-th-src="@{/public/js/concurrency-control.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
      (function(jQuery) {
         jQuery(document).ready(function() {
      	   jQuery.extend( jQuery.validator.messages, {
      	     'dateformat' : /*[[#{error_invalid_date}]]*/ 'Please enter a correct date/time',
      	     'inputmask': /*[[#{error_invalid_maskValue}]]*/ 'Please enter a valid value',
      	   });
      	 });
      })(jQuery);
      </script>

    </div>

  </body>

</html>
