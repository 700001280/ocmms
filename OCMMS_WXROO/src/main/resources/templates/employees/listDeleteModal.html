<div class="table-responsive" id="containerFields" data-th-fragment="employee-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('EmployeesCollectionThymeleafController')},itemLink=${@linkBuilder.of('EmployeesItemThymeleafController')}">
    <table id="employee-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="organization" data-th-text="#{label_employee_organization}">organization</th>
          <th data-data="costCenter" data-th-text="#{label_employee_costcenter}">costCenter</th>
          <th data-data="maintWorkCenter" data-th-text="#{label_employee_maintworkcenter}">maintWorkCenter</th>
          <th data-data="personNumber" data-th-text="#{label_employee_personnumber}">personNumber</th>
          <th data-data="username" data-th-text="#{label_employee_username}">username</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>organization</td>
          <td>costCenter</td>
          <td>maintWorkCenter</td>
          <td>personNumber</td>
          <td>username</td>
        </tr>
      </tbody>
    </table>
</div>
