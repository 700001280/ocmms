<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-list-layout}">

    <title data-th-text="|#{label_show_entity(#{label_objecttype})}|">Show ObjectType - Spring Roo application</title>

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!--CONTAINER-->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-th-fragment="inline-content" data-layout-fragment="content" data-th-object="${objectType}">
        <div>

          <!-- CONTENT -->
            <div id="mainEntityFieldSet">
              <ul class="list-unstyled" id="containerFields">
                  <li id="objecttype-code-field" data-z="e63193e4">
            	      <strong data-th-text="#{label_objecttype_code}">code</strong>
                    <span data-th-text="*{{code}}">codeValue</span>
         	        </li>
                  <li id="objecttype-description-field" data-z="4aec181a">
            	      <strong data-th-text="#{label_objecttype_description}">description</strong>
                    <span data-th-text="*{{description}}">descriptionValue</span>
         	        </li>
                  <li id="objecttype-recordstatus-field" data-z="fc43a844">
            	      <strong data-th-text="#{label_objecttype_recordstatus}">recordStatus</strong>
                    <span data-th-text="*{{recordStatus}}">recordStatusValue</span>
         	        </li>
                  <li id="objecttype-createddate-field" data-z="596498fa">
            	      <strong data-th-text="#{label_objecttype_createddate}">createdDate</strong>
                    <span data-th-text="*{{createdDate}}">createdDateValue</span>
         	        </li>
                  <li id="objecttype-createdby-field" data-z="b24e829a">
            	      <strong data-th-text="#{label_objecttype_createdby}">createdBy</strong>
                    <span data-th-text="*{{createdBy}}">createdByValue</span>
         	        </li>
                  <li id="objecttype-lastmodifieddate-field" data-z="171b08a4">
            	      <strong data-th-text="#{label_objecttype_lastmodifieddate}">lastModifiedDate</strong>
                    <span data-th-text="*{{lastModifiedDate}}">lastModifiedDateValue</span>
         	        </li>
                  <li id="objecttype-lastmodifiedby-field" data-z="a750d4c4">
            	      <strong data-th-text="#{label_objecttype_lastmodifiedby}">lastModifiedBy</strong>
                    <span data-th-text="*{{lastModifiedBy}}">lastModifiedByValue</span>
         	        </li>
              </ul>
            </div>

        </div>

      </section>
      <!-- /CONTENT -->
