<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="sortfield-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('SortFieldsCollectionThymeleafController')},itemLink=${@linkBuilder.of('SortFieldsItemThymeleafController')}">
    <table id="sortfield-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_sortfield_code}">code</th>
          <th data-data="description" data-th-text="#{label_sortfield_description}">description</th>
          <th data-data="organization" data-th-text="#{label_sortfield_organization}">organization</th>
          <th data-data="recordStatus" data-th-text="#{label_sortfield_recordstatus}">recordStatus</th>
          <th data-data="createdDate" data-th-text="#{label_sortfield_createddate}">createdDate</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>description</td>
          <td>organization</td>
          <td>recordStatus</td>
          <td>createdDate</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
