<div class="table-responsive" id="containerFields" data-th-fragment="warehouse-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('WarehousesCollectionThymeleafController')},itemLink=${@linkBuilder.of('WarehousesItemThymeleafController')}">
    <table id="warehouse-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="code" data-th-text="#{label_warehouse_code}">code</th>
          <th data-data="memo" data-th-text="#{label_warehouse_memo}">memo</th>
          <th data-data="description" data-th-text="#{label_warehouse_description}">description</th>
          <th data-data="organization" data-th-text="#{label_warehouse_organization}">organization</th>
          <th data-data="recordStatus" data-th-text="#{label_warehouse_recordstatus}">recordStatus</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>code</td>
          <td>memo</td>
          <td>description</td>
          <td>organization</td>
          <td>recordStatus</td>
        </tr>
      </tbody>
    </table>
</div>
