<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="notificationitem-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('NotificationItemsCollectionThymeleafController')},itemLink=${@linkBuilder.of('NotificationItemsItemThymeleafController')}">
    <table id="notificationitem-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="notificationHeader" data-th-text="#{label_notificationitem_notificationheader}">notificationHeader</th>
          <th data-data="failureObjectPart" data-th-text="#{label_notificationitem_failureobjectpart}">failureObjectPart</th>
          <th data-data="failureDamageType" data-th-text="#{label_notificationitem_failuredamagetype}">failureDamageType</th>
          <th data-data="failureDamageCause" data-th-text="#{label_notificationitem_failuredamagecause}">failureDamageCause</th>
          <th data-data="failureDescription" data-th-text="#{label_notificationitem_failuredescription}">failureDescription</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>notificationHeader</td>
          <td>failureObjectPart</td>
          <td>failureDamageType</td>
          <td>failureDamageCause</td>
          <td>failureDescription</td>
        </tr>
      </tbody>
    </table>
</div>
