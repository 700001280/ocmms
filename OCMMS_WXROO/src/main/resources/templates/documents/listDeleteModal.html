<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="document-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('DocumentsCollectionThymeleafController')},itemLink=${@linkBuilder.of('DocumentsItemThymeleafController')}">
    <table id="document-entity-table-item-to-remove" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="fileName" data-th-text="#{label_document_filename}">fileName</th>
          <th data-data="description" data-th-text="#{label_document_description}">description</th>
          <th data-data="fileType" data-th-text="#{label_document_filetype}">fileType</th>
          <th data-data="uploadDate" data-th-text="#{label_document_uploaddate}">uploadDate</th>
          <th data-data="lotoInfo" data-th-text="#{label_document_lotoinfo}">lotoInfo</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>fileName</td>
          <td>description</td>
          <td>fileType</td>
          <td>uploadDate</td>
          <td>lotoInfo</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
