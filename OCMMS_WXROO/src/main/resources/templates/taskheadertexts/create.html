<!DOCTYPE html>
<html lang="en" data-layout-decorate="~{layouts/default-layout}">
  <head id="head">

    <title data-th-text="#{label_create_entity(#{label_taskheadertext})}">
      Create TaskHeaderText - OCMMSROO - SpringRoo Application</title>

    <!-- DateTimePicker -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.min.css" data-th-href="@{/webjars/datetimepicker/build/jquery.datetimepicker.min.css}" />

  </head>

  <body id="body">

    <header role="banner">
      <!-- Content replaced by layout of the page displayed -->
    </header>

    <!-- CONTAINER -->
    <div class="container bg-container">
      <!-- CONTENT -->
      <!--
        Only the inner content of the following tag "section" is included
        within the template, in the section "content"
      -->
      <section data-layout-fragment="content">
        <div class="container-fluid content" data-th-with="collectionLink=${@linkBuilder.of('TaskHeaderTextsCollectionThymeleafController')}">

          <h1 data-th-text="#{label_create_entity(#{label_taskheadertext})}">Create TaskHeaderText</h1>

          <!-- FORM -->
          <form class="form-horizontal validate" method="POST" data-th-object="${taskHeaderText}" data-th-action="${collectionLink.to('create').with('taskHeaderText', taskHeaderText.id)}">

            <fieldset id="containerFields">
              <legend class="sr-only" data-th-text="#{label_data_entity(#{label_taskheadertext})}">TaskHeaderText data </legend>

<div class="form-group has-error has-feedback" data-z="362a9aaa" id="taskheadertext-taskheader-field" data-th-classappend="${#fields.hasErrors('taskHeader')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('TaskHeadersCollectionThymeleafController')}">
    <label for="taskHeader" class="col-md-3 control-label" data-th-text="#{label_taskheadertext_taskheader}">TaskHeader</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{taskHeader}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{taskHeader} == null" data-th-value="*{taskHeader.id}" data-th-text="*{{taskHeader}}" selected="selected">TaskHeader</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('taskHeader')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('taskHeader')}" aria-hidden="true"></span>
      <span id="taskHeader-error" class="help-block" data-th-if="${#fields.hasErrors('taskHeader')}" data-th-errors="*{taskHeader}">Error message.</span>
    </div>
</div>
<div class="form-group has-error has-feedback" data-z="90a7bcaa" id="taskheadertext-taskheadertextcode-field" data-th-classappend="${#fields.hasErrors('taskHeaderTextCode')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="taskHeaderTextCode" class="col-md-3 control-label" data-th-text="#{label_taskheadertext_taskheadertextcode}">taskHeaderTextCode</label>
  <div class="col-md-6">
    <input id="taskHeaderTextCode" name="taskHeaderTextCode" data-th-value="*{{taskHeaderTextCode}}" type="text" class="form-control" placeholder="taskHeaderTextCode" data-th-placeholder="#{label_taskheadertext_taskheadertextcode}" data-toggle="tooltip" aria-describedby="taskHeaderTextCodeStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('taskHeaderTextCode')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('taskHeaderTextCode')}" aria-hidden="true"></span>
      <span id="taskHeaderTextCode-error" class="help-block" data-th-if="${#fields.hasErrors('taskHeaderTextCode')}" data-th-errors="*{taskHeaderTextCode}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="442e2b74" id="taskheadertext-counterline-field" data-th-classappend="${#fields.hasErrors('counterLine')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="counterLine" class="col-md-3 control-label" data-th-text="#{label_taskheadertext_counterline}">counterLine</label>
  <div class="col-md-3">
    <input id="counterLine" name="counterLine" data-th-value="*{{counterLine}}" type="text" class="form-control inputmask" placeholder="counterLine" data-th-placeholder="#{label_taskheadertext_counterline}" data-toggle="tooltip" aria-describedby="counterLineStatus" data-inputmask-alias="numeric" data-inputmask-digits="0" required="required" />
      <span data-th-classappend="${#fields.hasErrors('counterLine')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('counterLine')}" aria-hidden="true"></span>
      <span id="counterLine-error" class="help-block" data-th-if="${#fields.hasErrors('counterLine')}" data-th-errors="*{counterLine}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="e6d706d4" id="taskheadertext-headertexttitle-field" data-th-classappend="${#fields.hasErrors('headerTextTitle')}? 'has-error has-feedback'" data-th-class="form-group">
  <label for="headerTextTitle" class="col-md-3 control-label" data-th-text="#{label_taskheadertext_headertexttitle}">headerTextTitle</label>
  <div class="col-md-6">
    <input id="headerTextTitle" name="headerTextTitle" data-th-value="*{{headerTextTitle}}" type="text" class="form-control" placeholder="headerTextTitle" data-th-placeholder="#{label_taskheadertext_headertexttitle}" data-toggle="tooltip" aria-describedby="headerTextTitleStatus" required="required" />
      <span data-th-classappend="${#fields.hasErrors('headerTextTitle')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('headerTextTitle')}" aria-hidden="true"></span>
      <span id="headerTextTitle-error" class="help-block" data-th-if="${#fields.hasErrors('headerTextTitle')}" data-th-errors="*{headerTextTitle}">Error message.</span>
  </div>
</div>
<div class="form-group has-error has-feedback" data-z="370c89ca" id="taskheadertext-recordstatus-field" data-th-classappend="${#fields.hasErrors('recordStatus')}? 'has-error has-feedback'" data-th-class="form-group" data-th-with="collectionLink=${@linkBuilder.of('RecordStatusesCollectionThymeleafController')}">
    <label for="recordStatus" class="col-md-3 control-label" data-th-text="#{label_taskheadertext_recordstatus}">RecordStatus</label>
    <div class="col-md-6">
      <!-- Select2 -->
      <select data-th-field="*{recordStatus}" class="form-control dropdown-select-ajax" data-allow-clear="true" data-data-ajax--url="${collectionLink.to('select2')}" data-ajax--cache="true" data-ajax--delay="250" data-ajax--data-type="json" data-data-placeholder="#{info_select_an_option}">
          <option data-th-unless="*{recordStatus} == null" data-th-value="*{recordStatus.id}" data-th-text="*{{recordStatus}}" selected="selected">RecordStatus</option>
      </select>
      <span data-th-classappend="${#fields.hasErrors('recordStatus')}? 'glyphicon glyphicon-remove form-control-feedback'" class="glyphicon glyphicon-remove form-control-feedback" data-th-if="${#fields.hasErrors('recordStatus')}" aria-hidden="true"></span>
      <span id="recordStatus-error" class="help-block" data-th-if="${#fields.hasErrors('recordStatus')}" data-th-errors="*{recordStatus}">Error message.</span>
    </div>
</div>
            </fieldset>


              <!-- buttons form -->
              <div class="form-group">
                <div class="col-md-9 col-md-offset-3">
                    <button type="submit" class="btn btn-primary" data-th-text="#{label_save}">Save</button>
                    <button type="reset" class="btn btn-default" onclick="location.href='list.html'" data-th-onclick="'location.href=\'' + @{${collectionLink.to('list')}} + '\''" data-th-text="#{label_reset}">Cancel</button>
                </div>
              </div>

          </form>
          <!-- /FORM -->

        </div>

      </section>
      <!-- /CONTENT -->
  </div>
  <!-- /CONTAINER -->

  <footer class="container">
    <!-- Content replaced by layout of the page displayed -->
  </footer>

  <!-- JavaScript
  ================================================== -->
  <!-- Placed at the end of the document so that the pages load faster -->
  <!-- JavaScript loaded by layout of the page displayed -->
  <!--
       Only the inner content of the following tag "javascript" is included
       within the template, in the div "javascript"
      -->
  <div data-layout-fragment="javascript">

    <!-- DateTimePicker -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-datetimepicker/2.5.4/build/jquery.datetimepicker.full.min.js" data-th-src="@{/webjars/datetimepicker/build/jquery.datetimepicker.full.min.js}"></script>
    <script src="../../static/public/js/datetimepicker-defaults.js" data-th-src="@{/public/js/datetimepicker-defaults.js}"></script>

    <!-- jquery.inputmask -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/3.3.1/jquery.inputmask.bundle.min.js" data-th-src="@{/webjars/jquery.inputmask/min/jquery.inputmask.bundle.min.js}"></script>
    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											Inputmask
													.extendAliases({
														'numeric' : {
															'groupSeparator' : /*[[#{label_inputmask_groupSeparator}]]*/'.',
															'radixPoint' : /*[[#{label_inputmask_radixPoint}]]*/','
														},
														'currency' : {
															'prefix' : /*[[#{label_inputmask_prefix}]]*/'',
															'suffix' : /*[[#{label_inputmask_suffix}]]*/' €'
														}
													});
										});
					})(jQuery);
  		</script>
    <script src="../../static/public/js/inputmask-defaults.js" data-th-src="@{/public/js/inputmask-defaults.js}"></script>

    <!-- JQuery Validation -->
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/jquery.validate.min.js" data-th-src="@{/webjars/jquery-validation/dist/jquery.validate.min.js}">
		  </script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/additional-methods.min.js" data-th-src="@{/webjars/jquery-validation/dist/additional-methods.min.js}">
			</script>
    <script src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.15.0/localization/messages_es.js" data-th-src="@{/webjars/jquery-validation/src/localization/messages_}+${#locale.language}+'.js'" data-th-if="${#locale.language} != 'en'">
			</script>
    <script src="../../static/public/js/validation-defaults.js" data-th-src="@{/public/js/validation-defaults.js}">
			</script>

    <script type="text/javascript" data-th-inline="javascript">
					(function(jQuery) {
						jQuery(document)
								.ready(
										function() {
											jQuery
													.extend(
															jQuery.validator.messages,
															{
																'dateformat' : /*[[#{error_invalid_date}]]*/'Please enter a correct date/time',
																'inputmask' : /*[[#{error_invalid_maskValue}]]*/'Please enter a valid value',
															});
										});
					})(jQuery);
		  </script>

    </div>

  </body>

</html>
