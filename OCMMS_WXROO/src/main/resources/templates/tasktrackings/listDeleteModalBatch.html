<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="tasktracking-entityModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('TaskTrackingsCollectionThymeleafController')},itemLink=${@linkBuilder.of('TaskTrackingsItemThymeleafController')}">
    <table id="tasktracking-entity-table-items-to-remove-batch" data-data-load-url="${collectionLink.to('datatablesByIdsIn')}">
      <thead>
        <tr>
          <th data-data="submitDate" data-th-text="#{label_tasktracking_submitdate}">submitDate</th>
          <th data-data="submitter" data-th-text="#{label_tasktracking_submitter}">submitter</th>
          <th data-data="technicalObject" data-th-text="#{label_tasktracking_technicalobject}">technicalObject</th>
          <th data-data="description" data-th-text="#{label_tasktracking_description}">description</th>
          <th data-data="taskTrackingPriority" data-th-text="#{label_tasktracking_tasktrackingpriority}">taskTrackingPriority</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
          <td>submitDate</td>
          <td>submitter</td>
          <td>technicalObject</td>
          <td>description</td>
          <td>taskTrackingPriority</td>
        </tr>
      </tbody>
    </table>
</div>
<!-- /TABLE -->
