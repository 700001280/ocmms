<!--TABLE-->
<div class="table-responsive" id="containerFields" data-th-fragment="employees-detailModalConfirmBody" data-th-with="collectionLink=${@linkBuilder.of('CostCentersItemEmployeesThymeleafController')}">
    <table id="employees-detail-table-items-to-remove-batch" data-parent-table="costcenter-entity-table" data-data-parent-id="${costCenter != null ? costCenter.id : ''}" data-data-load-url="${collectionLink.to('datatablesByIdsIn').with('costCenter', '_PARENTID_')}">
      <thead>
        <tr>
              <th data-data="organization" data-th-text="#{label_costcenter_employees_organization}">organization</th>
              <th data-data="costCenter" data-th-text="#{label_costcenter_employees_costcenter}">costCenter</th>
              <th data-data="maintWorkCenter" data-th-text="#{label_costcenter_employees_maintworkcenter}">maintWorkCenter</th>
              <th data-data="personNumber" data-th-text="#{label_costcenter_employees_personnumber}">personNumber</th>
              <th data-data="username" data-th-text="#{label_costcenter_employees_username}">username</th>
        </tr>
      </thead>
      <tbody data-th-remove="all">
        <tr>
              <td>organization</td>
              <td>costCenter</td>
              <td>maintWorkCenter</td>
              <td>personNumber</td>
              <td>username</td>
        </tr>
      </tbody>
    </table>
</div>
